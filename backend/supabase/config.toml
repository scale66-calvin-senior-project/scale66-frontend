# Supabase CLI Configuration
# This file is used by the Supabase CLI for local development and migrations

[project]
# Your Supabase project reference ID
project_id = "your-project-id"

[api]
# Port to use for the API URL
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API endpoints.
schemas = ["public", "storage"]

[db]
# Port to use for the local database URL
port = 54322
# Port to use for the local database's shadow database (used for migrations)
shadow_port = 54320
# The database major version to use
major_version = 15

[studio]
# Port to use for Supabase Studio
port = 54323

# Email testing server
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# The maximum file size allowed (in MiB)
file_size_limit = 50

[auth]
# Enable or disable authentication
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used in emails.
site_url = "http://localhost:3000"
# Additional redirect URLs (comma-separated)
additional_redirect_urls = []
# Time before tokens expire (in seconds)
jwt_expiry = 3600
# Enable anonymous sign-ins
enable_signup = true

[auth.email]
# Enable or disable email signup
enable_signup = true
# Enable or disable email confirmations
enable_confirmations = false

