name: Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK_STARTER: ${{ secrets.NEXT_PUBLIC_STRIPE_PAYMENT_LINK_STARTER }}
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK_GROWTH: ${{ secrets.NEXT_PUBLIC_STRIPE_PAYMENT_LINK_GROWTH }}
          NEXT_PUBLIC_STRIPE_PAYMENT_LINK_AGENCY: ${{ secrets.NEXT_PUBLIC_STRIPE_PAYMENT_LINK_AGENCY }}
      
      - name: Verify build output
        run: |
          ls -la out/ || echo "Build output not found"
          echo "Build completed, ready to deploy"

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: scale66-app
          channelId: live
          target: scale66-app
          entryPoint: ./frontend

